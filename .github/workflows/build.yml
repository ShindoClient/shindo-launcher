name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  determine-env:
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.build-env.outputs.env }}
    steps:
      - id: build-env
        run: |
          if [[ "${{ github.ref_name }}" == *"-canary"* ]]; then
            echo "env=canary" >> $GITHUB_OUTPUT
          else
            echo "env=stable" >> $GITHUB_OUTPUT
          fi

  build-windows:
    needs: determine-env
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Build app
        run: |
          bun run build:${{ needs.determine-env.outputs.env }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-windows
          path: artifacts/*

  build-linux-x64:
    needs: determine-env
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Build app
        run: |
          bun run build:${{ needs.determine-env.outputs.env }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-linux
          path: artifacts/*

  release:
    needs:
      - determine-env
      - build-windows
      - build-linux-x64
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Prepare release files
        run: |
          mkdir -p release-files
          find . -type f -name "*" -not -path "./release-files/*" -exec cp {} release-files/ \;
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-files/*
          draft: false
          prerelease: ${{ needs.determine-env.outputs.env == 'canary' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
