name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            script: release:linux
          - os: windows-latest
            platform: windows
            script: release:windows
          - os: macos-latest
            platform: mac
            script: release:mac

    runs-on: ${{ matrix.os }}
    name: Release (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build & Release
        run: bun run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.SHINDO_GH_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
