name: Release Launcher

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  release:
    name: Build & publish
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            script: release:linux
          - os: windows-latest
            script: release:windows
          - os: macos-latest
            script: release:mac
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Cache Bun + node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            node_modules
            packages/*/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Install dependencies
        run: bun install
      - name: Build project
        run: bun run build:app
      - name: Release installable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run ${{ matrix.script }}
