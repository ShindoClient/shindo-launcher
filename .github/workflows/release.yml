name: Release Launcher

on:
  release:
    types: [created]

jobs:
  make:
    name: Build & publish
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        platformMap:
          ubuntu-latest: linux
          windows-latest: win32
          macos-latest: darwin
        targetMap:
          linux: "appimage;deb"
          win32: "nsis"
          darwin: "dmg;zip"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/bun@v1
      - name: Install dependencies
        run: bun install
      - name: Build project
        run: bun run build:app
      - name: Package app
        env:
          PLATFORM: ${{ matrix.platformMap[matrix.os] }}
        run: bun package
      - name: Make installers
        env:
          PLATFORM: ${{ matrix.platformMap[matrix.os] }}
          TARGETS: ${{ matrix.targetMap[matrix.platformMap[matrix.os]] }}
        run: bun make
      - name: Publish release assets
        env:
          PLATFORM: ${{ matrix.platformMap[matrix.os] }}
          TARGETS: ${{ matrix.targetMap[matrix.platformMap[matrix.os]] }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun publish
