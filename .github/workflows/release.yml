name: Release Launcher

on:
  release:
    types: [created]

jobs:
  make:
    name: Build & publish
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            targets: "appimage;deb"
          - os: windows-latest
            platform: win32
            targets: nsis
          - os: macos-latest
            platform: darwin
            targets: "dmg;zip"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/bun@v1
      - name: Install dependencies
        run: bun install
      - name: Build project
        run: bun run build:app
      - name: Package app
        env:
          PLATFORM: ${{ matrix.platform }}
        run: bun package
      - name: Make installers
        env:
          PLATFORM: ${{ matrix.platform }}
          TARGETS: ${{ matrix.targets }}
        run: bun make
      - name: Publish release assets
        env:
          PLATFORM: ${{ matrix.platform }}
          TARGETS: ${{ matrix.targets }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun publish
